<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vietnam Zip Code Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sidebar">
    <h1>Vietnam Zip Codes</h1>
    <input type="text" id="search" placeholder="Search province, district, ward, or zip..." autocomplete="off" />
    <div id="breadcrumb"></div>
    <div id="region-filters"></div>
    <ul id="list"></ul>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="zipcodes.js"></script>
  <script src="mergers.js"></script>
  <script src="app.js"></script>
</body>
</html>
